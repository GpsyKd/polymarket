services:
  polybot:
    build: .
    image: polybot:latest
    container_name: polybot
    restart: unless-stopped
    env_file:
      - .env            # cp .env.example .env and fill in keys first
    volumes:
      - ./data:/app/data   # persists the SQLite ledger across restarts
    # "all" runs every signal in one process, each on its own cadence.
    # NOTE: an explicit --interval overrides EVERY strategy's cadence
    # (including the slow llm one) — omit it unless you mean exactly that.
    command: ["run", "--strategy", "all"]
